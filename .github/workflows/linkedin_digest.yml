name: LinkedIn Hiring Digest

on:
  schedule:
    - cron: "30 2 * * *"   # 08:00 AM IST daily

  workflow_dispatch:
    inputs:
      catchup_email:
        description: >
          One-time catchup: send full 7-day Tech/SDE history to this address
          (bypasses dedup). Leave blank for a normal run.
        required: false
        default: ""

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: linkedin_job_scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r linkedin_job_scraper/requirements.txt

      - name: Restore seen-posts database (cache between runs)
        uses: actions/cache@v4
        with:
          path: linkedin_job_scraper/seen_posts.db
          key: seen-posts-db-${{ github.run_id }}
          restore-keys: |
            seen-posts-db-

      - name: Run catchup send (new recipient — bypasses dedup)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.catchup_email != '' }}
        working-directory: linkedin_job_scraper
        env:
          GMAIL_SENDER:    ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
          DB_PATH:         seen_posts.db
        run: python scheduler.py --catchup-to "${{ github.event.inputs.catchup_email }}"

      - name: Run scraper and send digest
        if: ${{ github.event_name == 'schedule' || github.event.inputs.catchup_email == '' }}
        working-directory: linkedin_job_scraper
        env:
          GMAIL_SENDER:    ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT }}
          DB_PATH:         seen_posts.db
        run: python scheduler.py --now

      - name: Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log
          path: linkedin_job_scraper/scraper.log
          retention-days: 3
